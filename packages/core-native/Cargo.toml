[package]
name = "openoxygen-core-native"
version = "0.1.0"
edition = "2021"
description = "OpenOxygen native core — Windows system control, vision pipeline, vector search, sandbox"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
# NAPI-RS: Rust <-> Node.js bridge
napi = { version = "2", features = ["napi9", "async", "serde-json"] }
napi-derive = "2"

# Windows API
[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = [
  "Win32_Foundation",
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Input_KeyboardAndMouse",
  "Win32_Graphics_Gdi",
  "Win32_System_Threading",
  "Win32_System_ProcessStatus",
  "Win32_System_Registry",
  "Win32_System_DataExchange",
  "Win32_System_Ole",
  "Win32_System_Com",
  "Win32_Storage_FileSystem",
  "Win32_Security",
  "Win32_System_Memory",
  "Win32_NetworkManagement_IpHelper",
] }

# Image processing
image = { version = "0.25", features = ["png", "jpeg"] }

# System info
sysinfo = "0.33"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# UUID
uuid = { version = "1", features = ["v4"] }

# Temp files
tempfile = "3"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
strip = "symbols"
